<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>

    <style>

        .top-buttons{
    display:flex;
    gap:10px;
    margin:20px;
}

.home-btn,
.back-btn{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:14px;
}

.home-btn{
    background:#3965a7;
}

.back-btn{
    background:#198754;
}

.home-btn:hover{
    background:#0b5ed7;
}

.back-btn:hover{
    background:#157347;
}

        body{
            font-family:Arial,sans-serif;
            background:#f4f7fb;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#003366;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th{
            background:#003366;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        .confirmed{
            color:white;
            background:#28a745;
            padding:6px 12px;
            border-radius:20px;
        }

        .pending{
            color:white;
            background:#f39c12;
            padding:6px 12px;
            border-radius:20px;
        }

        .not-applied{
            color:white;
            background:#dc3545;
            padding:6px 12px;
            border-radius:20px;
        }
    </style>
</head>
<body>

    <div class="top-buttons">

    <button class="home-btn"
        onclick="window.location.href='/index.html'">
        <i class="fa-solid fa-house"></i>
        Home
    </button>

    <button class="back-btn"
        onclick="window.location.href='/dashboard'">
        <i class="fa-solid fa-arrow-left"></i>
        Dashboard
    </button>

</div>

<div class="container">

    <h1>My Applications</h1>

    <table>

        <thead>
            <tr>
                <th>Scheme Name</th>
                <th>Application Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="applicationsTable">
        </tbody>

    </table>

</div>

<script>

async function loadApplications() {

    const response =
    await fetch('/api/my-applications');

    const data =
    await response.json();

    const tbody =
    document.getElementById('applicationsTable');

    tbody.innerHTML = '';

    data.forEach(app => {

        tbody.innerHTML += `
        <tr>
            <td>${app.scheme_name}</td>
            <td>${app.application_date}</td>
            <td>
                <span class="status ${app.status.toLowerCase()}">
                    ${app.status}
                </span>
            </td>
        </tr>
        `;
    });
}

loadApplications();

</script>

</body>
</html>
